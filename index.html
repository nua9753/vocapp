<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="لغت‌نامه">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>دفترچه لغت</title>
<style>
:root {
  --bg:#f8f8f7; --surface:#fff; --surface2:#f2f1ef;
  --border:#e4e3e0; --text:#1a1a18; --text2:#6b6b67; --text3:#9e9e9a;
  --accent:#2563eb; --accent-bg:#eff6ff; --accent-border:#bfdbfe;
  --green:#16a34a; --green-bg:#f0fdf4; --green-border:#bbf7d0;
  --red:#dc2626; --red-bg:#fef2f2; --red-border:#fecaca;
  --r:10px; --rl:14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root.dark-mode {
    --bg:#1a1a1a; --surface:#2d2d2d; --surface2:#3a3a3a;
    --border:#444; --text:#e8e8e8; --text2:#b8b8b8; --text3:#888;
    --accent:#4a9eff; --accent-bg:#1a3a5a; --accent-border:#2a5a8a;
    --green:#2ecc71; --green-bg:#1a3a1a; --green-border:#3a6a3a;
    --red:#ff6b6b; --red-bg:#3a1a1a; --red-border:#6a3a3a;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Vazirmatn','Segoe UI',Tahoma,system-ui,sans-serif;color:var(--text);font-size:14px;display:flex;flex-direction:column}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.header h1{font-size:16px;font-weight:700}
.header-pills{display:flex;gap:6px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);font-weight:500}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(80px + var(--safe-bottom))}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:10;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-family:inherit;transition:color .15s}
.nav-btn svg{width:20px;height:20px}
.nav-btn.act{color:var(--accent)}
.nav-btn .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:1px;opacity:0}
.nav-btn.act .dot{opacity:1}
.panel{display:none}.panel.act{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text)}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px}
input[type=text],input[type=search],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;width:100%;transition:all .12s;-webkit-appearance:none}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent}
.btn-primary:active{opacity:.85}
.btn-sm{padding:8px 12px;font-size:12px;font-weight:500;width:auto}
.flex{display:flex}.gap-8{gap:8px}.mt-8{margin-top:8px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center}
.stat .n{font-size:20px;font-weight:700;color:var(--text)}
.stat .l{font-size:10px;color:var(--text3);margin-top:2px}
.word-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.word-en{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.word-fa{font-size:14px;color:var(--text2)}
.word-ex{font-size:11px;color:var(--text3);margin-top:4px;padding-top:4px;border-top:1px solid var(--border);direction:ltr;text-align:left;font-style:italic}
.search-wrap{margin-bottom:12px;position:relative}
.search-wrap input{padding-right:36px}
.search-wrap .search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.msg{font-size:13px;text-align:center;min-height:20px;margin-top:8px}
.loading{display:inline-block;width:4px;height:4px;background:var(--accent);border-radius:50%;animation:loading 1.4s infinite}
@keyframes loading{0%,80%,100%{opacity:.5}40%{opacity:1}}
</style>
</head>
<body>

<div class="header">
  <h1>📖 دفترچه لغت</h1>
  <div class="header-pills">
    <button class="pill" style="border:none;cursor:pointer;background:none;padding:0" onclick="toggleDarkMode()" title="تاریک‌نما">🌙</button>
    <span class="pill" id="hdr-total">۰</span>
  </div>
</div>

<div class="main" id="main">

  <!-- ADD -->
  <div id="p-add" class="panel act">
    <div class="card">
      <div class="card-title">کلمه جدید</div>
      <div class="row2">
        <div class="field"><label>انگلیسی *</label><input type="text" id="in-en" placeholder="beautiful" autocomplete="off"></div>
        <div class="field"><label>فارسی *</label><input type="text" id="in-fa" placeholder="زیبا"></div>
      </div>
      <div class="row2">
        <div class="field"><label>تلفظ</label><input type="text" id="in-pr" placeholder="بیوتیفول"></div>
        <div class="field"><label>جمله مثال</label><input type="text" id="in-ex" placeholder="She is beautiful"></div>
      </div>
      <button class="btn btn-primary mt-8" onclick="addWord()">+ افزودن برای همه</button>
      <div id="add-msg" class="msg"></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="n" id="s-total">۰</div><div class="l">کل</div></div>
      <div class="stat"><div class="n" id="s-synced">۰</div><div class="l">زمان آخر</div></div>
    </div>
  </div>

  <!-- LIST -->
  <div id="p-list" class="panel">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="ls-search" placeholder="جستجو..." oninput="renderList()">
    </div>
    <div id="word-list"></div>
  </div>

  <!-- SETTINGS -->
  <div id="p-settings" class="panel">
    <div class="card">
      <div class="card-title">⚙️ تنظیمات</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">تمام کلمات برای همه کاربران سراسری است</div>
      <button class="btn btn-primary btn-sm" onclick="syncNow()">🔄 آپدیت الآن</button>
      <div id="settings-msg" class="msg"></div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn act" onclick="showPanel('add',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    افزودن<div class="dot"></div>
  </button>
  <button class="nav-btn" onclick="showPanel('list',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
    لیست<div class="dot"></div>
  </button>
  <button class="nav-btn" onclick="showPanel('settings',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-1.78 7.78l-4.24-4.24m-3.08-3.08l-4.24-4.24"/></svg>
    تنظیمات<div class="dot"></div>
  </button>
</nav>

<script>
const API_URL = 'http://localhost:5000/api/words';
let words = [];

function toFa(n) { return String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]); }

async function loadWords() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    words = data.words || [];
    updateStats();
    renderList();
    updateTime();
  } catch (e) {
    msg('add-msg', '⚠️ اتصال به سرور ناموفق', 'var(--red)');
    setTimeout(loadWords, 5000);
  }
}

async function addWord() {
  const en = document.getElementById('in-en').value.trim();
  const fa = document.getElementById('in-fa').value.trim();
  const pr = document.getElementById('in-pr').value.trim();
  const ex = document.getElementById('in-ex').value.trim();

  if (!en || !fa) { msg('add-msg', 'انگلیسی و فارسی لازم است', 'var(--red)'); return; }
  if (words.find(w => w.en.toLowerCase() === en.toLowerCase())) { msg('add-msg', 'این کلمه قبلاً وجود دارد', 'var(--yellow)'); return; }

  msg('add-msg', '⏳ درحال اضافه...', 'var(--accent)');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ en, fa, pr, ex, date: new Date().toISOString().split('T')[0] })
    });

    if (!res.ok) { msg('add-msg', 'خطا!', 'var(--red)'); return; }

    msg('add-msg', '✓ اضافه شد!', 'var(--green)');
    ['in-en','in-fa','in-pr','in-ex'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('in-en').focus();

    loadWords();
  } catch (e) {
    msg('add-msg', 'خطا: ' + e.message, 'var(--red)');
  }
}

function renderList() {
  const q = (document.getElementById('ls-search').value || '').toLowerCase();
  let pool = words;
  if (q) pool = pool.filter(w => w.en.toLowerCase().includes(q) || w.fa.includes(q));

  const wrap = document.getElementById('word-list');
  if (!pool.length) { wrap.innerHTML = '<div class="empty">کلمه‌ای یافت نشد</div>'; return; }

  wrap.innerHTML = pool.map(w => `
    <div class="word-item">
      <div class="word-en">${w.en} 🔊</div>
      <div class="word-fa">${w.fa}</div>
      ${w.pr ? `<div style="font-size:12px;color:var(--text3)">${w.pr}</div>` : ''}
      ${w.ex ? `<div class="word-ex">${w.ex}</div>` : ''}
    </div>`).join('');
}

function updateStats() {
  document.getElementById('hdr-total').textContent = toFa(words.length);
  document.getElementById('s-total').textContent = toFa(words.length);
}

function updateTime() {
  const now = new Date();
  const h = toFa(String(now.getHours()).padStart(2, '0'));
  const m = toFa(String(now.getMinutes()).padStart(2, '0'));
  document.getElementById('s-synced').textContent = `${h}:${m}`;
}

async function syncNow() {
  msg('settings-msg', '⏳ آپدیت...', 'var(--accent)');
  await loadWords();
  msg('settings-msg', '✓ آپدیت شد!', 'var(--green)');
}

function msg(id, text, color) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.style.color = color;
  setTimeout(() => el.textContent = '', 3000);
}

function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('act'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('act'));
  document.getElementById('p-' + name).classList.add('act');
  btn.classList.add('act');
}

function toggleDarkMode() {
  document.documentElement.classList.toggle('dark-mode');
  localStorage.setItem('dark-mode', document.documentElement.classList.contains('dark-mode'));
}

function loadDarkMode() {
  if (localStorage.getItem('dark-mode') === 'true') document.documentElement.classList.add('dark-mode');
}

// Auto sync every 30 seconds
setInterval(loadWords, 30000);
setInterval(updateTime, 60000);

loadDarkMode();
loadWords();
</script>
</body>
</html>
